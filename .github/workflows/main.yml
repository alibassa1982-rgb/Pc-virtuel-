name: Create RDP on GitHub runner with Tailscale (UNMASKED)
on:
  workflow_dispatch:
    inputs:
      run_minutes:
        description: 'Minutes to keep the runner available'
        required: false
        default: '60'

jobs:
  create-rdp:
    name: Create RDP on GitHub Windows runner
    runs-on: windows-latest
    env:
      # Default minutes to keep the runner available (can be overridden at dispatch)
      RUN_DURATION_MINUTES: ${{ github.event.inputs.run_minutes || '60' }}

    steps:
      - name: Generate RDP username & password (UNMASKED)
        id: gencreds
        shell: powershell
        run: |
          $username = "rdp-guest"
          $pwLength = 20
          $chars = (48..57) + (65..90) + (97..122) + (33..47)
          $password = -join (Get-Random -Count $pwLength -InputObject $chars | ForEach-Object {[char]$_})

          # Export to GITHUB_ENV for later steps
          "RDP_USER=$username" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RDP_PASSWORD=$password" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "Generated credentials for user: $username"
          Write-Host "Password will be displayed later (UNMASKED)."

      - name: Enable Remote Desktop (require NLA) and restart service
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" -Value 1 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "SecurityLayer" -Value 1 -Force
          Restart-Service -Name TermService -Force

      - name: Create or reset local RDP user (UNMASKED) - corrected
        shell: powershell
        env:
          RDP_USER: ${{ env.RDP_USER }}
          RDP_PASSWORD: ${{ env.RDP_PASSWORD }}
        run: |
          $username = $env:RDP_USER
          $password = $env:RDP_PASSWORD
          if (-not $username -or -not $password) {
            Write-Error "RDP_USER or RDP_PASSWORD missing from environment."
            exit 1
          }

          $secure = ConvertTo-SecureString $password -AsPlainText -Force

          if (Get-LocalUser -Name $username -ErrorAction SilentlyContinue) {
            Set-LocalUser -Name $username -Password $secure
            Write-Host "Existing user ${username}: password reset."
          } else {
            New-LocalUser -Name $username -Password $secure -PasswordNeverExpires -AccountNeverExpires
            Write-Host "Created user ${username}."
          }

          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username -ErrorAction SilentlyContinue

          # Grant local administrators rights (added)
          Add-LocalGroupMember -Group "Administrators" -Member $username -ErrorAction SilentlyContinue
          Write-Host "User ${username} added to Administrators group."

      - name: Install Tailscale (MSI)
        shell: powershell
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-latest-amd64.msi"
          $installerPath = Join-Path $env:TEMP 'tailscale.msi'
          Invoke-WebRequest -Uri $tsUrl -OutFile $installerPath -UseBasicParsing
          Start-Process msiexec.exe -ArgumentList "/i", "`"$installerPath`"", "/quiet", "/norestart" -Wait
          Remove-Item $installerPath -Force

      - name: Start Tailscale and create firewall rule limited to Tailscale interface (if detected)
        shell: powershell
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          # Locate tailscale.exe in common install locations (use ${env:...} where name includes parentheses)
          $candidates = @(
            (Join-Path ${env:ProgramFiles} 'Tailscale IPN\tailscale.exe'),
            (Join-Path ${env:ProgramFiles} 'Tailscale\tailscale.exe'),
            (Join-Path ${env:ProgramFiles(x86)} 'Tailscale\tailscale.exe')
          )
          $tsExe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $tsExe) { Write-Error "tailscale.exe introuvable. Installation a peut-être échoué."; exit 1 }

          if (-not $env:TAILSCALE_AUTH_KEY -or $env:TAILSCALE_AUTH_KEY -eq "") {
            Write-Error "Le secret TAILSCALE_AUTH_KEY n'est pas fourni. Ajoutez-le aux secrets du repo."
            exit 1
          }

          # Start tailscale with the provided auth key
          & $tsExe up --authkey=$env:TAILSCALE_AUTH_KEY --hostname=gh-runner-$env:GITHUB_RUN_ID --accept-dns=false --accept-routes=false
          Start-Sleep -Seconds 3

          # Wait for IPv4 address
          $tsIP = $null
          for ($i=0; $i -lt 14; $i++) {
            $out = & $tsExe ip -4 2>$null
            if ($out) {
              # take first IPv4-looking token
              $match = ($out -split '\s+') | Where-Object { $_ -match '^\d{1,3}(\.\d{1,3}){3}$' } | Select-Object -First 1
              if ($match) { $tsIP = $match; break }
            }
            Start-Sleep -Seconds 5
          }

          if (-not $tsIP) { Write-Error "Tailscale n'a pas assigné d'IP après attente."; exit 1 }

          "TAILSCALE_IP=$tsIP" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "Tailscale IP: $tsIP"

          # Firewall rule: restrict to Tailscale interface if possible
          $adapter = Get-NetAdapter | Where-Object { $_.InterfaceDescription -like '*Tailscale*' -or $_.Name -like '*Tailscale*' } | Select-Object -First 1
          if ($null -ne $adapter) {
            if (Get-NetFirewallRule -DisplayName 'RDP-Tailscale' -ErrorAction SilentlyContinue) {
              Remove-NetFirewallRule -DisplayName 'RDP-Tailscale' -ErrorAction SilentlyContinue
            }
            New-NetFirewallRule -DisplayName 'RDP-Tailscale' -Direction Inbound -Action Allow `
              -Protocol TCP -LocalPort 3389 -InterfaceAlias $adapter.Name -Profile Private,Domain
            Write-Host "RDP firewall rule created on interface $($adapter.Name)."
          } else {
            if (Get-NetFirewallRule -DisplayName 'RDP-Tailscale' -ErrorAction SilentlyContinue) {
              Remove-NetFirewallRule -DisplayName 'RDP-Tailscale' -ErrorAction SilentlyContinue
            }
            New-NetFirewallRule -DisplayName 'RDP-Tailscale' -Direction Inbound -Action Allow `
              -Protocol TCP -LocalPort 3389 -Profile Private,Domain
            Write-Warning "Aucun adaptateur Tailscale détecté: règle créée limitée aux profils Private/Domain."
          }

      - name: Save and show credentials (UNMASKED) and create artifact
        shell: powershell
        env:
          RDP_USER: ${{ env.RDP_USER }}
          RDP_PASSWORD: ${{ env.RDP_PASSWORD }}
          TAILSCALE_IP: ${{ env.TAILSCALE_IP }}
        run: |
          $user = $env:RDP_USER
          $pass = $env:RDP_PASSWORD
          $ip = $env:TAILSCALE_IP

          if (-not $user -or -not $pass -or -not $ip) {
            Write-Error "Une des valeurs (user/pass/ip) est manquante."
            exit 1
          }

          $out = Join-Path $env:RUNNER_TEMP 'rdp-creds.txt'
          "User: $user`nPassword: $pass`nTailscale IP: $ip" | Out-File -FilePath $out -Encoding utf8

          Write-Host "=== RDP CREDENTIALS (UNMASKED) ==="
          Write-Host "User: $user"
          Write-Host "Password: $pass"
          Write-Host "Tailscale IP: $ip"
          Write-Host "==================================="
          Write-Host "Saved credentials to $out"

      - name: Upload credentials artifact (UNMASKED)
        uses: actions/upload-artifact@v4
        with:
          name: rdp-creds-unmasked
          path: ${{ runner.temp }}\rdp-creds.txt

      - name: Keep runner available for a limited time (configurable)
        shell: powershell
        run: |
          $minutes = [int]$env:RUN_DURATION_MINUTES
          Write-Host "Runner will remain available for $minutes minute(s)."
          $end = (Get-Date).AddMinutes($minutes)
          while ((Get-Date) -lt $end) {
            Write-Host ("[{0}] RDP ready at {1} (User: {2})" -f (Get-Date), $env:TAILSCALE_IP, $env:RDP_USER)
            Start-Sleep -Seconds 30
          }
          Write-Host "RUN_DURATION elapsed; workflow will proceed to cleanup (if any) and finish."

      - name: Optional cleanup (remove local user, stop tailscale) - runs always
        if: always()
        shell: powershell
        run: |
          try {
            $username = $env:RDP_USER
            if ($username -and (Get-LocalUser -Name $username -ErrorAction SilentlyContinue)) {
              # Remove admin membership first (best-effort)
              Remove-LocalGroupMember -Group "Administrators" -Member $username -ErrorAction SilentlyContinue
              Remove-LocalGroupMember -Group "Remote Desktop Users" -Member $username -ErrorAction SilentlyContinue
              Remove-LocalUser -Name $username -ErrorAction SilentlyContinue
              Write-Host "Local user ${username} removed."
            }

            if (Get-NetFirewallRule -DisplayName 'RDP-Tailscale' -ErrorAction SilentlyContinue) {
              Remove-NetFirewallRule -DisplayName 'RDP-Tailscale' -ErrorAction SilentlyContinue
              Write-Host "Firewall rule RDP-Tailscale removed."
            }

            # Stop tailscale (best-effort)
            $candidates = @(
              (Join-Path ${env:ProgramFiles} 'Tailscale IPN\tailscale.exe'),
              (Join-Path ${env:ProgramFiles} 'Tailscale\tailscale.exe'),
              (Join-Path ${env:ProgramFiles(x86)} 'Tailscale\tailscale.exe')
            )
            $tsExe = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
            if ($tsExe) {
              & $tsExe down
              Write-Host "Tailscale stopped (down)."
            }
          } catch {
            Write-Warning "Cleanup encountered an issue: $_"
          }
