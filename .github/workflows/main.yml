name: Create RDP on GitHub runner with ngrok (UNMASKED)
on:
  workflow_dispatch:
    inputs:
      run_minutes:
        description: 'Minutes to keep the runner available'
        required: false
        default: '60'

jobs:
  create-rdp:
    name: Create RDP on GitHub Windows runner
    runs-on: windows-latest
    env:
      # Default minutes to keep the runner available (can be overridden at dispatch)
      RUN_DURATION_MINUTES: ${{ github.event.inputs.run_minutes || '60' }}

    steps:
      - name: Generate RDP username & password (UNMASKED)
        id: gencreds
        shell: powershell
        run: |
          $username = "rdp-guest"
          $pwLength = 20
          $chars = (48..57) + (65..90) + (97..122) + (33..47)
          $password = -join (Get-Random -Count $pwLength -InputObject $chars | ForEach-Object {[char]$_})

          # Export to GITHUB_ENV for later steps
          "RDP_USER=$username" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "RDP_PASSWORD=$password" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          Write-Host "Generated credentials for user: $username"
          Write-Host "Password will be displayed later (UNMASKED)."

      - name: Enable Remote Desktop (require NLA) and restart service
        shell: powershell
        run: |
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' `
            -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "UserAuthentication" -Value 1 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' `
            -Name "SecurityLayer" -Value 1 -Force
          Restart-Service -Name TermService -Force

      - name: Create or reset local RDP user (UNMASKED) - corrected
        shell: powershell
        env:
          RDP_USER: ${{ env.RDP_USER }}
          RDP_PASSWORD: ${{ env.RDP_PASSWORD }}
        run: |
          $username = $env:RDP_USER
          $password = $env:RDP_PASSWORD
          if (-not $username -or -not $password) {
            Write-Error "RDP_USER or RDP_PASSWORD missing from environment."
            exit 1
          }

          $secure = ConvertTo-SecureString $password -AsPlainText -Force

          if (Get-LocalUser -Name $username -ErrorAction SilentlyContinue) {
            Set-LocalUser -Name $username -Password $secure
            Write-Host "Existing user ${username}: password reset."
          } else {
            New-LocalUser -Name $username -Password $secure -PasswordNeverExpires -AccountNeverExpires
            Write-Host "Created user ${username}."
          }

          Add-LocalGroupMember -Group "Remote Desktop Users" -Member $username -ErrorAction SilentlyContinue

      - name: Install ngrok (download & extract)
        shell: powershell
        run: |
          $zipUrl = 'https://bin.equinox.io/c/4VmDzA7iaHb/ngrok-stable-windows-amd64.zip'
          $zipPath = Join-Path $env:TEMP 'ngrok.zip'
          $outDir = Join-Path $env:RUNNER_TEMP 'ngrok'
          Invoke-WebRequest -Uri $zipUrl -OutFile $zipPath -UseBasicParsing
          Expand-Archive -Path $zipPath -DestinationPath $outDir -Force
          Remove-Item $zipPath -Force
          "NGROK_PATH=$outDir" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "ngrok extracted to $outDir"

      - name: Start ngrok TCP tunnel for RDP and create firewall rule
        shell: powershell
        env:
          NGROK_AUTH_TOKEN: ${{ secrets.NGROK_AUTH_TOKEN }}
          GITHUB_RUN_ID: ${{ github.run_id }}
        run: |
          if (-not $env:NGROK_AUTH_TOKEN -or $env:NGROK_AUTH_TOKEN -eq '') {
            Write-Error "Le secret NGROK_AUTH_TOKEN n'est pas fourni. Ajoutez-le aux secrets du repo."
            exit 1
          }

          $ngrokDir = Join-Path $env:RUNNER_TEMP 'ngrok'
          $ngrokExe = Join-Path $ngrokDir 'ngrok.exe'
          if (-not (Test-Path $ngrokExe)) {
            Write-Error "ngrok.exe introuvable dans $ngrokDir"
            exit 1
          }

          # Start ngrok in background (tcp tunnel on 3389). The local API is on http://127.0.0.1:4040
          $args = "tcp 3389 --authtoken=$($env:NGROK_AUTH_TOKEN) --log=stdout"
          Start-Process -FilePath $ngrokExe -ArgumentList $args -WindowStyle Hidden
          Start-Sleep -Seconds 2

          # Wait for ngrok API to return a tcp tunnel
          $public = $null
          for ($i=0; $i -lt 20; $i++) {
            try {
              $tunnels = Invoke-RestMethod -Uri 'http://127.0.0.1:4040/api/tunnels' -ErrorAction Stop
              if ($tunnels -and $tunnels.tunnels) {
                foreach ($t in $tunnels.tunnels) {
                  if ($t.public_url -and $t.public_url -like 'tcp://*') { $public = $t.public_url; break }
                }
                if ($public) { break }
              }
            } catch {
              # API not ready yet
            }
            Start-Sleep -Seconds 3
          }

          if (-not $public) { Write-Error "ngrok n'a pas exposé de tunnel TCP dans le délai imparti."; exit 1 }

          # Save public address
          "NGROK_PUBLIC_URL=$public" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Write-Host "ngrok public endpoint: $public"

          # Create a firewall rule scoped to the ngrok executable to limit exposure
          if (Get-NetFirewallRule -DisplayName 'RDP-ngrok' -ErrorAction SilentlyContinue) {
            Remove-NetFirewallRule -DisplayName 'RDP-ngrok' -ErrorAction SilentlyContinue
          }
          New-NetFirewallRule -DisplayName 'RDP-ngrok' -Direction Inbound -Action Allow `
            -Protocol TCP -LocalPort 3389 -Program $ngrokExe -Profile Private,Domain,Public
          Write-Host "Firewall rule RDP-ngrok created for program $ngrokExe"

      - name: Save and show credentials (UNMASKED) and create artifact
        shell: powershell
        env:
          RDP_USER: ${{ env.RDP_USER }}
          RDP_PASSWORD: ${{ env.RDP_PASSWORD }}
          NGROK_PUBLIC_URL: ${{ env.NGROK_PUBLIC_URL }}
        run: |
          $user = $env:RDP_USER
          $pass = $env:RDP_PASSWORD
          $url = $env:NGROK_PUBLIC_URL

          if (-not $user -or -not $pass -or -not $url) {
            Write-Error "Une des valeurs (user/pass/url) est manquante."
            exit 1
          }

          $out = Join-Path $env:RUNNER_TEMP 'rdp-creds.txt'
          "User: $user`nPassword: $pass`nngrok: $url" | Out-File -FilePath $out -Encoding utf8

          Write-Host "=== RDP CREDENTIALS (UNMASKED) ==="
          Write-Host "User: $user"
          Write-Host "Password: $pass"
          Write-Host "ngrok endpoint: $url"
          Write-Host "==================================="
          Write-Host "Saved credentials to $out"

      - name: Upload credentials artifact (UNMASKED)
        uses: actions/upload-artifact@v4
        with:
          name: rdp-creds-unmasked
          path: ${{ runner.temp }}\rdp-creds.txt

      - name: Keep runner available for a limited time (configurable)
        shell: powershell
        run: |
          $minutes = [int]$env:RUN_DURATION_MINUTES
          Write-Host "Runner will remain available for $minutes minute(s)."
          $end = (Get-Date).AddMinutes($minutes)
          while ((Get-Date) -lt $end) {
            Write-Host ("[{0}] RDP ready at {1} (User: {2})" -f (Get-Date), $env:NGROK_PUBLIC_URL, $env:RDP_USER)
            Start-Sleep -Seconds 30
          }
          Write-Host "RUN_DURATION elapsed; workflow will proceed to cleanup (if any) and finish."

      - name: Optional cleanup (remove local user, stop ngrok) - runs always
        if: always()
        shell: powershell
        run: |
          try {
            $username = $env:RDP_USER
            if ($username -and (Get-LocalUser -Name $username -ErrorAction SilentlyContinue)) {
              Remove-LocalUser -Name $username -ErrorAction SilentlyContinue
              Write-Host "Local user ${username} removed."
            }

            if (Get-NetFirewallRule -DisplayName 'RDP-ngrok' -ErrorAction SilentlyContinue) {
              Remove-NetFirewallRule -DisplayName 'RDP-ngrok' -ErrorAction SilentlyContinue
              Write-Host "Firewall rule RDP-ngrok removed."
            }

            # Stop ngrok process (best-effort)
            Get-Process -Name ngrok -ErrorAction SilentlyContinue | Stop-Process -Force -ErrorAction SilentlyContinue
            Write-Host "ngrok stopped (if running)."
          } catch {
            Write-Warning "Cleanup encountered an issue: $_"
          }
